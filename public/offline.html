<!doctype html>
<html lang="sk">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline Inventory</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #07111f;
        color: #f7fbff;
        font-family: Arial, Helvetica, sans-serif;
      }
      main {
        max-width: 32rem;
        padding: 2rem;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 1.5rem;
        background: rgba(255, 255, 255, 0.04);
      }
      h1 { margin-top: 0; }
      p { line-height: 1.7; color: #cbd5e1; }
    </style>
  </head>
  <body>
    <main>
      <h1>You are offline</h1>
      <p>
        Cached inventory screens remain available. New mutations should sync when the
        connection returns.
      </p>
    </main>
  </body>
</html>
